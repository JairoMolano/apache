# ============================================================
# Configuración Apache — Reverse Proxy hacia Gunicorn/Flask
# ============================================================
# Este archivo le dice a Apache que actúe como intermediario:
#   Cliente (browser) → Apache :80 → Gunicorn :5000 → Flask
# ============================================================

<VirtualHost *:80>

    ServerName localhost
    ServerAdmin admin@laboratorio.local

    # ── Logs ────────────────────────────────────────────────
    ErrorLog  /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined

    # ── Proxy inverso ───────────────────────────────────────
    # ProxyPass: redirige TODO el tráfico de / hacia Gunicorn
    # ProxyPassReverse: corrige las cabeceras de respuesta
    ProxyPass        / http://flask:5000/
    ProxyPassReverse / http://flask:5000/

    # ── Cabeceras de seguridad básicas ───────────────────────
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

</VirtualHost>
